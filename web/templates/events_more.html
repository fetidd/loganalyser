{% for row in rows %}
<tr class="event-row"
    onclick="
      const detail = this.nextElementSibling;
      if (detail.classList.contains('expanded')) {
        detail.classList.remove('expanded');
        detail.innerHTML = '';
      } else {
        htmx.ajax('GET', '/events/{{ row.id }}/detail', {target: detail, swap: 'outerHTML'});
      }
    ">
  <td><span class="badge badge-{{ row.kind }}">{{ row.kind }}</span></td>
  <td>{{ row.name }}</td>
  <td>{{ row.timestamp }}</td>
  <td class="duration">
    {% if row.duration_ms is not none %}{{ row.duration_ms }} ms{% else %}—{% endif %}
  </td>
</tr>
<tr class="detail-row"></tr>
{% endfor %}
{% if has_more %}
<tr class="load-sentinel"
    hx-get="/events/results/more?page={{ next_page }}&name={{ name }}&kind={{ kind }}"
    hx-trigger="intersect once"
    hx-swap="outerHTML">
  <td colspan="4" class="load-more">loading more…</td>
</tr>
{% endif %}
